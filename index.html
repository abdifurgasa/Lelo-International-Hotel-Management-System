<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lelo International Hotel</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="login-container">

    <!-- Hotel Name -->
    <h1 data-lang="hotelName">Lelo International Hotel</h1>

    <!-- Login Title -->
    <h3 data-lang="loginTitle">Login</h3>

    <!-- Language Selector -->
    <select id="langSelect">
        <option value="en">English</option>
        <option value="am">አማርኛ</option>
        <option value="om">Afaan Oromoo</option>
    </select>

    <!-- Login Form -->
    <input type="email" id="email" placeholder="Email">
    
    <input type="password" id="password" placeholder="Password">

    <button id="loginBtn" data-lang="login">Login</button>

</div>


<!-- Language System -->
<script type="module">

import { setLanguage } from "./js/lang/lang.js";

const langSelect = document.getElementById("langSelect");

/* Default language */
setLanguage("en");

/* Change language */
langSelect.addEventListener("change", (e)=>{
    setLanguage(e.target.value);
});

</script>


<!-- Firebase Authentication -->
<script type="module" src="./js/auth.js"></script>

</body>
          </html>
