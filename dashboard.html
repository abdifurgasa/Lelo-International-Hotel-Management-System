<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<h1>Hotel Dashboard</h1>

<button onclick="logout()">Logout</button>

<hr>

<!-- MENU -->
<button onclick="loadPage('rooms')">Rooms</button>
<button onclick="loadPage('orders')">Orders</button>
<button onclick="loadPage('staff')">Staff</button>

<hr>

<!-- ROOMS -->
<div id="rooms" class="page">
<h2>Rooms</h2>
<input id="roomNumber" placeholder="Room Number">
<button onclick="addRoom()">Add Room</button>
<div id="roomList"></div>
</div>

<!-- ORDERS -->
<div id="orders" class="page" style="display:none">
<h2>Orders</h2>
<input id="orderItem" placeholder="Item">
<button onclick="addOrder()">Add Order</button>
<div id="orderList"></div>
</div>

<!-- STAFF -->
<div id="staff" class="page" style="display:none">
<h2>Staff</h2>
<input id="staffEmail" placeholder="Email">
<button onclick="addStaff()">Add Staff</button>
<div id="staffList"></div>
</div>

<!-- SCRIPTS -->
<script type="module" src="js/global.js"></script>
<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/dashboard.js"></script>
<script type="module" src="js/rooms.js"></script>
<script type="module" src="js/order.js"></script>
<script type="module" src="js/staff.js"></script>

</body>
</html>
