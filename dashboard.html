<!DOCTYPE html>
<html>

<head>

<title>Dashboard - Lelo International Hotel</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/dashboard.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- Sidebar Menu -->
<div class="sidebar">

<h2>Lelo Hotel</h2>

<ul>

<li onclick="window.location.reload()">Dashboard</li>

<li>Rooms</li>
<li>Restaurant</li>
<li>Drinks</li>
<li>Bookings</li>
<li>Finance</li>

<li id="logout">Logout</li>

</ul>

</div>


<!-- Main Dashboard -->
<div class="main">

<div class="topbar">
<h2>Dashboard</h2>
</div>


<!-- Statistics Cards -->
<div class="cards">

<div class="card">
<h3>Rooms</h3>
<p id="roomCount">0</p>
</div>

<div class="card">
<h3>Restaurant</h3>
<p id="foodCount">0</p>
</div>

<div class="card">
<h3>Drinks</h3>
<p id="drinkCount">0</p>
</div>

<div class="card">
<h3>Revenue</h3>
<canvas id="revenueChart"></canvas>
</div>

</div>

</div>


<!-- Dashboard Script -->
<script type="module" src="js/dashboard.js"></script>

</body>
</html>
